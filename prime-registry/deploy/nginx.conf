# Nginx config for numinals.io
# Place at: /etc/nginx/sites-available/primeregistry

server {
    listen 80;
    server_name numinals.io www.numinals.io;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name numinals.io www.numinals.io;

    # SSL (use certbot to generate)
    ssl_certificate     /etc/letsencrypt/live/numinals.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/numinals.io/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Serve static landing page
    root /home/charles/prime-registry/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
