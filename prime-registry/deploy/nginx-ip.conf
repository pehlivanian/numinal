# Nginx config — IP-based (use until domain is registered)
# Replace numinals.io with your domain when ready
# Install: sudo cp deploy/nginx-ip.conf /etc/nginx/sites-available/numinal
#          sudo ln -s /etc/nginx/sites-available/numinal /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 108.41.84.149 numinals.io www.numinals.io;

    # Serve static landing page
    root /home/charles/.openclaw/workspace/prime-registry/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
